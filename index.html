<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joyería Nain Xuping</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #fff0f5;
}

@keyframes fadeUp {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}

header {
    text-align: center;
    padding: 60px 20px;
    background: linear-gradient(135deg, #fbc2eb, #fcd6e3);
    animation: fadeUp 1s ease;
}

header h1 {
    font-family: 'Playfair Display';
    font-size: 40px;
}

header p {
    font-weight: 700;
}

.logo img {
    width: 110px;
    border-radius: 10px;
    background: white;
    padding: 5px;
}

.controls {
    text-align: center;
    padding: 20px;
}

input, select {
    padding: 10px;
    border-radius: 20px;
    border: none;
}

.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.4s;
    animation: fadeUp 0.8s ease;
}

.card:hover {
    transform: translateY(-8px) scale(1.03);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    cursor: pointer;
}

.card-body {
    text-align: center;
    padding: 15px;
}

.view-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 15px;
    background: #ff69b4;
    color: white;
    border-radius: 20px;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
}

.view-btn:hover {
    background: #ff85c1;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.9);
    text-align:center;
}

.modal img {
    max-width: 80%;
    max-height: 80%;
    margin-top: 60px;
    border-radius: 15px;
}

.close {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 35px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.btn {
    position: absolute;
    top: 50%;
    font-size: 30px;
    color: white;
    cursor: pointer;
    padding: 10px;
}

.prev { left: 10px; }
.next { right: 10px; }

.float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    text-decoration: none;
}

/* CONTACTO */
.contacto {
    background: linear-gradient(135deg, #fbc2eb, #fcd6e3);
    text-align: center;
    padding: 40px 20px;
    margin-top: 40px;
}

.contacto h2 {
    font-family: 'Playfair Display';
    margin-bottom: 15px;
}

.contacto p {
    margin: 10px 0;
    font-weight: 500;
}

.contacto a {
    color: #d63384;
    text-decoration: none;
    font-weight: 600;
}

.contacto a:hover {
    text-decoration: underline;
}

/* ICONOS */
.social-icons {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
}

.social-icons a {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 25px;
    color: white;
    font-size: 16px;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
}

.social-icons .wa { background: #25D366; }
.social-icons .fb { background: #1877F2; }
.social-icons .ig {
    background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
}
.social-icons .tt { background: #000000; }

.social-icons a:hover {
    transform: scale(1.05);
}

.social-icons i {
    font-size: 18px;
}

/* RESPONSIVE */
@media (max-width: 500px) {
    .container {
        grid-template-columns: 1fr;
    }

    .modal img {
        max-width: 95%;
        max-height: 75%;
    }
}
</style>
</head>

<body>

<header>
<h1>Joyería Nain Xuping💎</h1>

<div class="logo">
    <img src="Imagenes/logo.jfif">
</div>

<p>Elegancia que brilla ✨</p>
</header>

<div class="controls">
<input type="text" id="search" placeholder="Buscar producto...">
<select id="filter">
<option value="all">Todos</option>
<option value="collares">Collares</option>
<option value="anillos">Anillos</option>
<option value="brazaletes">Brazaletes</option>
<option value="aretes">Aretes</option>
</select>
</div>

<div class="container" id="products"></div>

<!-- MODAL -->
<div id="modal" class="modal">
    <span class="close" onclick="closeModal()">✖</span>
    <span class="btn prev" onclick="prevImg()">❮</span>
    <span class="btn next" onclick="nextImg()">❯</span>
    <img id="modal-img">
</div>

<script>
const productos = [
["Collares Elegantes","collares",["Imagenes/Collares/Collar1.jpeg"],"Collares.html"],
["Anillos","anillos",["Imagenes/Anillos/anillo1.jpeg"],"Anillos.html"],
["Brazaletes","brazaletes",["Imagenes/Brazaletes/Brazalete1.jpeg"],"brazaletes.html"],
["Aretes","aretes",["Imagenes/Aretes/arete1.jpg"],"Aretes.html"],
];

const container = document.getElementById("products");

productos.forEach((p,i) => {
container.innerHTML += `
<div class="card" data-name="${p[0].toLowerCase()}" data-category="${p[1]}">
    
    <img src="${p[2][0]}" onclick="openModal(${i})">

    <div class="card-body">
        <h3>${p[0]}</h3>
        <p>Producto elegante</p>
        
        <a href="${p[3]}" class="view-btn">Ver producto</a>
    </div>

</div>`;
});

/* MODAL */
let currentProduct = 0;
let currentImg = 0;

function openModal(index){
    currentProduct = index;
    currentImg = 0;
    document.getElementById("modal").style.display="block";
    showImg();
}

function showImg(){
    document.getElementById("modal-img").src = productos[currentProduct][2][currentImg];
}

function nextImg(){
    let imgs = productos[currentProduct][2];
    currentImg = (currentImg + 1) % imgs.length;
    showImg();
}

function prevImg(){
    let imgs = productos[currentProduct][2];
    currentImg = (currentImg - 1 + imgs.length) % imgs.length;
    showImg();
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

document.getElementById("modal").onclick = function(e){
    if(e.target === this) closeModal();
};

/* BUSCADOR */
const search = document.getElementById("search");
const filter = document.getElementById("filter");

function updateProducts() {
    const searchValue = search.value.toLowerCase();
    const filterValue = filter.value;

    document.querySelectorAll(".card").forEach(product => {
        const name = product.dataset.name;
        const category = product.dataset.category;

        const matchSearch = name.includes(searchValue);
        const matchFilter = filterValue === "all" || category === filterValue;

        product.style.display = (matchSearch && matchFilter) ? "block" : "none";
    });
}

search.addEventListener("input", updateProducts);
filter.addEventListener("change", updateProducts);
</script>
